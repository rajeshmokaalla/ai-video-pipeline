version: "3.9"

services:
  pipeline:
    build:
      context: .
      dockerfile: Dockerfile
    image: ai-video-pipeline:latest
    container_name: ai_video_pipeline
    ports:
      - "7860:7860"   # Gradio UI
    extra_hosts:
      - "host.docker.internal:host-gateway"   # lets the container reach host Ollama on Linux
    volumes:
      - ./outputs:/app/outputs          # persist generated videos
      - ./models:/app/models            # persist downloaded models
      - ./credentials:/app/credentials  # YouTube OAuth tokens
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-llama3.2:3b}
      - IMAGE_BACKEND=${IMAGE_BACKEND:-sdxl}
      - WHISPER_MODEL=${WHISPER_MODEL:-base}
      - MUSICGEN_MODEL=${MUSICGEN_MODEL:-facebook/musicgen-small}
      - YOUTUBE_PRIVACY=${YOUTUBE_PRIVACY:-private}
      - SVD_ENABLED=${SVD_ENABLED:-false}
    restart: unless-stopped
